<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="sign.css">
</head>

<body style="background-color: rgb(242, 234, 234);">

    <div class="w">
        <form class="div" id="signupForm">

            <label>Name:</label><br>
            <input type="text" name="name" placeholder="Name" required><br><br>

            <label>Mobile Number:</label><br>
            <input type="tel" name="number" placeholder="Number" required><br><br>

            <button type="submit" class="co">Sign Up</button>

        </form>
    </div>

    <script>
        document.getElementById("signupForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent POST request
            window.location.href = "index.html";
        });
    </script>

</body>

</html>
